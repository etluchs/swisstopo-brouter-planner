name: Deploy to GitHub Pages
# The app is fully static (index.html + src/, Leaflet from CDN), so Pages just
# serves the assembled files — no build step. Enable once in the repo:
# Settings → Pages → Source: "GitHub Actions".
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static site
        # Publish only the app, not the repo's tooling/tests/issue tracker.
        # Stamp a cache-busting ?v=<sha> onto the local assets so a new deploy is
        # never masked by a stale cached app.js/styles.css (Pages caches for 10 min).
        run: |
          mkdir -p _site
          cp -r src _site/
          V="${GITHUB_SHA::8}"
          sed -e "s#\./src/app\.js#./src/app.js?v=$V#g" \
              -e "s#\./src/styles\.css#./src/styles.css?v=$V#g" \
              index.html > _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
